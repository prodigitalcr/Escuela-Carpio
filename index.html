                const pres = [...new Set(logsGlobal.filter(l => coincideFecha(l.hora, fecha) && l.tipo === 'ENTRADA').map(l => l.id))];
                Object.entries(db.personas).forEach(([id, p]) => { if(!pres.includes(id)) b.insertAdjacentHTML('beforeend', `<tr><td>${id}</td><td>${p.nombre}</td><td>${p.puesto||''}</td><td style="color:red">AUSENTE</td></tr>`); });
            } else {
                logsGlobal.filter(l => coincideFecha(l.hora, fecha) && l.tipo === tipo).forEach(l => {
                    const p = db.personas[l.id] || {};
                    b.insertAdjacentHTML('beforeend', `<tr><td>${l.id}</td><td>${l.nombre}</td><td>${p.puesto||''}</td><td>${l.hora.split(',')[1]}</td></tr>`);
                });
            }
        function borrarTodo() { if(confirm("¿Borrar todo?")) { database.ref('personas').remove(); database.ref('logs').remove(); location.reload(); } }
        function cambiarPasswordEscaner() { let n = prompt("Nueva Clave:"); if(n){ passEscaner=n; localStorage.setItem('PASS_SCAN',n); } }
        function cambiarPasswordMaster() { let n = prompt("Nueva Clave:"); if(n){ passMaster=n; localStorage.setItem('PASS_MASTER',n); } }
        function cambiarFondo() { let url = prompt("URL Imagen:"); if(url){ localStorage.setItem('CUSTOM_BG', url); location.reload(); } }

            const win = window.open('','','width=350,height=500');

            win.document.close();
        }
        function imprimirTodosLosCarnets() {
            const win = window.open('',''); win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script></head><body>`);
            Object.entries(db.personas).forEach(([id,p]) => { win.document.write(`<div style="width:200px;border:1px solid #333;padding:10px;text-align:center;display:inline-block;margin:5px;"><div id="qr-${id.replace(/\W/g,'')}"></div><b>${id}</b><br>${p.nombre}</div>`); });
            win.document.write(`<script>${Object.keys(db.personas).map(id => `new QRCode(document.getElementById("qr-${id.replace(/\W/g,'')}"),{text:\"${id}\",width:100,height:100});`).join('\n')} setTimeout(()=>window.print(),1500);<\/script></body></html>`);
            win.document.close();
        }
        function importarCSV() { 
            const f = document.getElementById('csvFile').files[0]; const r = new FileReader(); 
            r.onload = (e) => { e.target.result.split('\n').forEach((l, i) => { if(i>0 && l.trim()){ let c=l.split(','); db.personas[c[0].trim()]={nombre:c[1]?.trim(), puesto:c[2]?.trim(), telefono:c[3]?.trim()}; } }); renderAlumnos(); alert("Importado."); }; 
            r.readAsText(f); 
        }
    </script>
