<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASISTENCIA DE ESCUELA LA CARPIO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { 
            --primary: #1a5c8a; --accent: #27ae60; --danger: #c0392b; 
            --dark: #2c3e50; --info: #0d6efd; --warning: #f39c12; 
            --cr-blue: #002b7f; --cr-red: #ce1126;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-color: #f8f9fa;
            background-image: linear-gradient(rgba(255,255,255,0.94), rgba(255,255,255,0.94)),
                repeating-linear-gradient(45deg, var(--cr-blue) 0, var(--cr-blue) 2px, transparent 0, transparent 50%),
                repeating-linear-gradient(-45deg, var(--cr-red) 0, var(--cr-red) 2px, transparent 0, transparent 50%);
            background-size: cover, 80px 80px, 80px 80px;
        }

        .navbar { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--cr-red); }
        #scan-view, #parent-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .scanner-card { background: #ffffff; padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 8px solid var(--cr-blue); }
        .input-scan { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #e0e0e0; border-radius: 12px; text-align: center; outline: none; margin-top: 15px; box-sizing: border-box; }

        #master-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white !important; display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.2s; }
        .btn-m { background-color: var(--primary) !important; } 
        .btn-s { background-color: var(--accent) !important; } 
        .btn-d { background-color: var(--danger) !important; } 
        .btn-i { background-color: var(--info) !important; } 
        .btn-w { background-color: var(--warning) !important; }
        .btn-dark { background-color: var(--dark) !important; }

        .power-bar { background: #f1f4f8; padding: 15px; border-radius: 15px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; border: 1px solid #ddd; flex-wrap: wrap; justify-content: space-between;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #e9ecef; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--dark); border-bottom: 2px solid #dee2e6; }
        td { border-bottom: 1px solid #eee; padding: 12px 15px; }

        .tab-btn { padding: 12px 28px; cursor: pointer; border: none; background: #e9ecef; border-radius: 8px; font-weight: bold; margin-right: 10px; }
        .tab-btn.active { background: var(--cr-blue); color: white; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .status-in { background: #d4edda; color: #155724; }
        .status-none { background: #f8d7da; color: #721c24; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="navbar no-print">
        <div><strong>ASISTENCIA DE ESCUELA LA CARPIO</strong></div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-w" onclick="mostrarVista('parent-view')">👨‍👩‍👧 PADRES</button>
            <button class="btn btn-i" onclick="pedirClaveEscaner()">📷 ESCÁNER</button>
            <button class="btn btn-m" onclick="pedirClaveMaster()">🔓 PANEL MASTER</button>
        </div>
    </div>

    <div id="scan-view" style="display:none;">
        <div class="scanner-card">
            <h2 style="color:var(--cr-blue);">Registro de Entrada/Salida</h2>
            <input type="text" id="lector" class="input-scan" placeholder="Escanee carné..." autofocus>
            <div id="reader"></div>
            <button id="btnCamara" class="btn btn-i" style="width:100%; margin-top:15px;" onclick="toggleCamara()">📱 USAR CÁMARA DEL CELULAR</button>
            <div id="resBox" style="margin-top:20px; display:none; padding:20px; border-radius:15px; border: 2px solid #ddd;">
                <h2 id="resNombre"></h2>
                <h3 id="resMov"></h3>
            </div>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="btn btn-dark" style="flex:1" onclick="cambiarPasswordEscaner()">🔑 CLAVE</button>
                <button class="btn btn-d" style="flex:1" onclick="cerrarVistaProtegida('scan-view')">CERRAR</button>
            </div>
        </div>
    </div>

    <div id="parent-view">
        <div class="scanner-card" style="border-top-color: var(--accent);">
            <h2 style="color: var(--accent);">Consulta para Padres</h2>
            <input type="text" id="parentInput" class="input-scan" placeholder="Código de miembro de la escuela">
            <button class="btn btn-s" style="width:100%; margin-top:20px; padding:15px;" onclick="consultarPadre()">BUSCAR INFORMACIÓN</button>
            <div id="parentResult" style="margin-top:20px; display:none; text-align:left;">
                <div style="background:#f9f9f9; padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:15px;">
                    <h3 id="parentStudentName" style="margin:0; color:var(--primary);"></h3>
                    <p id="parentStudentPuesto" style="margin:5px 0; font-weight:bold; color:var(--cr-red);"></p>
                    <button id="btnConsultaWA" class="btn btn-w" style="width:100%; margin-top:10px;">💬 ENVIAR CONSULTA</button>
                </div>
                <div id="parentLogList" style="border: 1px solid #eee; border-radius:10px; max-height:200px; overflow-y:auto; background:white;"></div>
            </div>
        </div>
    </div>

    <div id="master-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="color:var(--primary); margin:0;">Gestión Administrativa</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-s" onclick="editarNumeroJunta()">📱 TEL. OFICIAL</button>
                <button class="btn btn-i" onclick="cambiarFondo()">🖼️ FONDO</button>
                <button class="btn btn-w" onclick="cambiarPasswordMaster()">🔑 CLAVE MASTER</button>
                <button class="btn btn-d" onclick="cerrarMaster()">❌ SALIR</button>
            </div>
        </div>
        <div class="tabs-container">
            <button id="tab1" class="tab-btn active" onclick="cambiarTab(1)">👥 MIEMBROS</button>
            <button id="tab2" class="tab-btn" onclick="cambiarTab(2)">📊 REPORTE HISTÓRICO</button>
        </div>
        <div id="sec-alumnos">
            <div class="power-bar no-print">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-i" onclick="agregarMiembroManual()">➕ AGREGAR</button>
                    <button class="btn btn-m" onclick="sincronizarConNube()">💾 GUARDAR EN NUBE</button>
                    <button class="btn btn-s" onclick="imprimirTodosLosCarnets()">📇 CARNÉS GRUPAL</button>
                    <button class="btn btn-dark" onclick="document.getElementById('csvFile').click()">📤 IMPORTAR CSV</button>
                    <input type="file" id="csvFile" accept=".csv" style="display:none;" onchange="importarCSV()">
                </div>
                <button class="btn btn-d" onclick="borrarTodo()">🧨 BORRAR TODO</button>
            </div>
            <input type="text" id="busqueda" placeholder="🔍 Buscar por nombre, código o sección..." onkeyup="filtrarRapido()" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:2px solid var(--primary);">
            <table>
                <thead>
                    <tr><th>Estado Hoy</th><th>Cédula/Código</th><th>Nombre</th><th>Sección</th><th>WhatsApp</th><th class="no-print">Acciones</th></tr>
                </thead>
                <tbody id="tablaAlumnos"></tbody>
            </table>
        </div>
        <div id="sec-reporte" style="display:none;">
            <div class="power-bar no-print">
                <div style="display:flex; gap:10px; align-items:center;">
                    <label><b>Fecha a Consultar:</b></label>
                    <input type="date" id="reportDate" style="padding:10px; border-radius:8px; border:1px solid #ccc; font-weight:bold;">
                </div>
                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                    <button class="btn btn-s" onclick="filtrarVistaReporte('ENTRADA')">✅ LLEGARON</button>
                    <button class="btn btn-m" onclick="filtrarVistaReporte('SALIDA')">🚪 SALIERON</button>
                    <button class="btn btn-d" onclick="filtrarVistaReporte('AUSENTES')">❌ NO LLEGARON</button>
                </div>
                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                    <button class="btn btn-w" onclick="exportarPDFReporte()">📕 PDF / ENVIAR</button>
                    <button class="btn btn-dark" style="background:#555 !important;" onclick="borrarHistorialDia()">🗑️ BORRAR DÍA</button>
                </div>
            </div>
            <h2 id="tituloReporte" style="color:var(--primary); text-align:center;">Seleccione una fecha y elija un reporte</h2>
            <table id="tabla-logs-final">
                <thead id="headReporte"></thead>
                <tbody id="cuerpoReporte"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- SEGURIDAD INICIAL ---
        const FIREBASE_SECRET = "MI_CODIGO_OCULTO_123";

        // Función SHA-256
        async function hashPassword(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Forzar limpieza si hubo errores previos de acceso
        if (!localStorage.getItem('VER_SEC_1')) {
            localStorage.removeItem('PASS_MASTER_HASH');
            localStorage.removeItem('PASS_SCAN_HASH');
            localStorage.setItem('VER_SEC_1', 'true');
        }

        // Hashes por defecto (CARPIO2026 y 1234)
        const DEFAULT_MASTER_HASH = "8661603ba7866d5494793617305943b1747e909a4735c0211320f785b99a613f";
        const DEFAULT_SCAN_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

        let hashMaster = localStorage.getItem('PASS_MASTER_HASH') || DEFAULT_MASTER_HASH;
        let hashEscaner = localStorage.getItem('PASS_SCAN_HASH') || DEFAULT_SCAN_HASH;

        // CONFIGURACIÓN FIREBASE
        let NUMERO_OFICIAL_JUNTA = "88888888"; 
        const firebaseConfig = { databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let db = { personas: {} };
        let logsGlobal = [];
        let html5QrCode;

        document.getElementById('reportDate').valueAsDate = new Date();
        database.ref('config/numeroOficial').on('value', (s) => { if(s.val()) NUMERO_OFICIAL_JUNTA = s.val(); });

        function coincideFecha(horaLog, fechaInputISO) {
            if(!horaLog || !fechaInputISO) return false;
            let [y, m, d] = fechaInputISO.split('-');
            m = parseInt(m).toString(); d = parseInt(d).toString();
            let str = horaLog.split(',')[0].split(' ')[0]; 
            return str === `${d}/${m}/${y}` || str === `${d}/${m.padStart(2,'0')}/${y}` || 
                   str === `${m}/${d}/${y}` || str === `${m.padStart(2,'0')}/${d}/${y}` ||
                   str === `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
        }

        database.ref('personas').on('value', (s) => { db.personas = s.val() || {}; renderAlumnos(); });
        database.ref('logs').on('value', (s) => { 
            logsGlobal = []; 
            s.forEach(c => { let val = c.val(); val.key = c.key; logsGlobal.push(val); });
            renderAlumnos(); 
        });

        async function pedirClaveEscaner() { 
            let p = prompt("Clave de Escáner:"); 
            if(p && await hashPassword(p) === hashEscaner) mostrarVista('scan-view');
            else if(p) alert("Clave Incorrecta");
        }

        async function pedirClaveMaster() { 
            let p = prompt("Clave de Administración (Master):"); 
            if(p && await hashPassword(p) === hashMaster) document.getElementById('master-panel').style.display = 'block';
            else if(p) alert("Clave Incorrecta");
        }

        function procesarEscaneo(id) {
            id = id.trim();
            if(db.personas[id]) {
                const hISO = new Date().toISOString().split('T')[0];
                const marcas = logsGlobal.filter(l => (l.fechaISO?l.fechaISO===hISO:coincideFecha(l.hora, hISO)) && l.id === id);
                let tipo = !marcas.some(l => l.tipo === 'ENTRADA') ? "ENTRADA" : (!marcas.some(l => l.tipo === 'SALIDA') ? "SALIDA" : null);
                if(!tipo) return alert("Ya registró hoy.");
                database.ref('logs').push({ id: id, nombre: db.personas[id].nombre, hora: new Date().toLocaleString(), fechaISO: hISO, tipo: tipo, secret: FIREBASE_SECRET });
                const res = document.getElementById('resBox'); res.style.display = 'block'; res.style.background = tipo === "ENTRADA" ? "#d4edda" : "#f8d7da";
                document.getElementById('resNombre').innerText = db.personas[id].nombre; document.getElementById('resMov').innerText = "✅ " + tipo;
                setTimeout(() => res.style.display = 'none', 2000);
            } else { alert("Código no reconocido."); }
        }

        document.getElementById('lector').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') { procesarEscaneo(e.target.value); e.target.value = ''; }
        });

        function sincronizarConNube() {
            const dataToSave = { ...db.personas, secret: FIREBASE_SECRET };
            database.ref('personas').set(dataToSave).then(() => alert("Guardado seguro en la nube.")).catch(() => alert("Error de permisos."));
        }

        async function cambiarPasswordMaster() { 
            let n = prompt("Defina su NUEVA Clave Master:"); 
            if(n){ hashMaster = await hashPassword(n); localStorage.setItem('PASS_MASTER_HASH', hashMaster); alert("Clave Master actualizada."); } 
        }

        async function cambiarPasswordEscaner() { 
            let n = prompt("Defina su NUEVA Clave de Escáner:"); 
            if(n){ hashEscaner = await hashPassword(n); localStorage.setItem('PASS_SCAN_HASH', hashEscaner); alert("Clave de Escáner actualizada."); } 
        }

        function toggleCamara() {
            const readerDiv = document.getElementById('reader');
            if (readerDiv.style.display === 'none') {
                readerDiv.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => { procesarEscaneo(decodedText); pararCamara(); });
                document.getElementById('btnCamara').innerText = "❌ CERRAR CÁMARA";
            } else { pararCamara(); }
        }

        function pararCamara() {
            if(html5QrCode) html5QrCode.stop().then(() => { 
                document.getElementById('reader').style.display = 'none'; 
                document.getElementById('btnCamara').innerText = "📱 USAR CÁMARA DEL CELULAR"; 
            });
        }

        function consultarPadre() {
            const id = document.getElementById('parentInput').value.trim();
            if(!db.personas[id]) return alert("Código no encontrado.");
            const p = db.personas[id];
            document.getElementById('parentStudentName').innerText = p.nombre;
            document.getElementById('parentStudentPuesto').innerText = "Sección: " + (p.puesto || "N/A");
            document.getElementById('btnConsultaWA').onclick = () => { 
                window.open(`https://wa.me/506${NUMERO_OFICIAL_JUNTA}?text=${encodeURIComponent('Consulta sobre: '+p.nombre+' (ID: '+id+')')}`, '_blank');
            };
            database.ref('logs').orderByChild('id').equalTo(id).once('value', (s) => {
                const list = document.getElementById('parentLogList'); list.innerHTML = "";
                if(s.exists()){ s.forEach(c => { let l=c.val(); list.innerHTML = `<div style="padding:10px; border-bottom:1px solid #eee;"><span>${l.hora}</span> - <b>${l.tipo}</b></div>` + list.innerHTML; }); }
                else { list.innerHTML = "<p style='padding:10px;'>Sin registros.</p>"; }
                document.getElementById('parentResult').style.display = 'block';
            });
        }

        function filtrarVistaReporte(tipo) {
            const fechaBuscada = document.getElementById('reportDate').value;
            if(!fechaBuscada) return alert("Seleccione una fecha");
            const cuerpo = document.getElementById('cuerpoReporte'), head = document.getElementById('headReporte'), titulo = document.getElementById('tituloReporte');
            cuerpo.innerHTML = "";
            let logsDelDia = logsGlobal.filter(l => l.fechaISO ? l.fechaISO === fechaBuscada : coincideFecha(l.hora, fechaBuscada));
            if(tipo === 'ENTRADA' || tipo === 'SALIDA') {
                titulo.innerText = tipo === 'ENTRADA' ? `✅ LLEGARON (${fechaBuscada})` : `🚪 SALIERON (${fechaBuscada})`;
                head.innerHTML = `<tr><th>Hora</th><th>Código</th><th>Nombre</th><th>Sección</th></tr>`;
                logsDelDia.filter(l => l.tipo === tipo).forEach(l => {
                    const p = db.personas[l.id] || {};
                    cuerpo.insertAdjacentHTML('beforeend', `<tr><td>${l.hora.split(',')[1]||l.hora}</td><td><b>${l.id}</b></td><td>${l.nombre}</td><td>${p.puesto || '-'}</td></tr>`);
                });
            } else {
                titulo.innerText = `❌ NO LLEGARON (${fechaBuscada})`;
                head.innerHTML = `<tr><th>Código</th><th>Nombre</th><th>Sección</th><th>Acción</th></tr>`;
                const presentes = [...new Set(logsDelDia.filter(l => l.tipo === 'ENTRADA').map(l => l.id))];
                Object.entries(db.personas).forEach(([id, p]) => {
                    if(id!=='secret' && !presentes.includes(id)) cuerpo.insertAdjacentHTML('beforeend', `<tr><td><b>${id}</b></td><td>${p.nombre}</td><td>${p.puesto || '-'}</td><td><button class="btn btn-s" onclick="enviarWA('${p.telefono}')">💬 Avisar</button></td></tr>`);
                });
            }
        }

        function renderAlumnos() {
            const t = document.getElementById('tablaAlumnos'); t.innerHTML = "";
            const hISO = new Date().toISOString().split('T')[0];
            const pres = [...new Set(logsGlobal.filter(l => (l.fechaISO?l.fechaISO===hISO:coincideFecha(l.hora, hISO)) && l.tipo === 'ENTRADA').map(l => l.id))];
            Object.entries(db.personas).forEach(([id, p]) => {
                if(id === 'secret') return;
                const isP = pres.includes(id);
                t.insertAdjacentHTML('beforeend', `<tr><td><span class="status-badge ${isP?'status-in':'status-none'}">${isP?'LLEGÓ':'AUSENTE'}</span></td><td><b>${id}</b></td><td><input style="border:none;width:100%" value="${p.nombre}" onchange="db.personas['${id}'].nombre=this.value"></td><td><input style="border:none;width:100%;color:var(--cr-red);font-weight:bold;" value="${p.puesto||''}" onchange="db.personas['${id}'].puesto=this.value"></td><td><input style="border:none;width:100%" value="${p.telefono||''}" onchange="db.personas['${id}'].telefono=this.value"></td><td class="no-print"><button class="btn btn-s" onclick="enviarWA('${p.telefono}')">💬</button> <button class="btn btn-i" onclick="descargarCarnet('${id}')">📇</button> <button class="btn btn-d" onclick="if(confirm('¿Borrar?')) database.ref('personas/'+'${id}').remove()">🗑️</button></td></tr>`);
            });
        }

        function editarNumeroJunta() { let n = prompt("WhatsApp oficial:", NUMERO_OFICIAL_JUNTA); if(n) database.ref('config/numeroOficial').set(n); }
        function mostrarVista(id) { document.getElementById('scan-view').style.display = (id==='scan-view')?'flex':'none'; document.getElementById('parent-view').style.display = (id==='parent-view')?'flex':'none'; if(id!=='scan-view') pararCamara(); }
        function cerrarMaster() { document.getElementById('master-panel').style.display = 'none'; }
        function cerrarVistaProtegida(id) { document.getElementById(id).style.display = 'none'; mostrarVista('parent-view'); }
        function filtrarRapido() { let f = document.getElementById('busqueda').value.toUpperCase(); let rows = document.getElementById("tablaAlumnos").getElementsByTagName("tr"); for (let i = 0; i < rows.length; i++) { rows[i].style.display = (rows[i].textContent.toUpperCase().indexOf(f) > -1) ? "" : "none"; } }
        function enviarWA(tel) { if(!tel) return; window.open(`https://wa.me/506${tel.replace(/\D/g,'')}`, '_blank'); }
        function cambiarTab(n) { document.getElementById('sec-alumnos').style.display = (n===1)?'block':'none'; document.getElementById('sec-reporte').style.display = (n===2)?'block':'none'; document.getElementById('tab1').className = (n===1)?'tab-btn active':'tab-btn'; document.getElementById('tab2').className = (n===2)?'tab-btn active':'tab-btn'; }
        function agregarMiembroManual() { const id=prompt("Cédula:"); if(id) { db.personas[id]={nombre:prompt("Nombre:"), puesto:prompt("Sección:"), telefono:prompt("WhatsApp:")}; renderAlumnos(); } }
        function exportarPDFReporte() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(document.getElementById('tituloReporte').innerText, 14, 20); doc.autoTable({ html: '#tabla-logs-final', startY: 30, theme: 'grid' }); doc.save(`Reporte_${document.getElementById('reportDate').value}.pdf`); }
        function borrarTodo() { if(confirm("¿Borrar todo?")) database.ref().update({ personas: null, logs: null, secret: FIREBASE_SECRET }).then(() => location.reload()); }
        function cambiarFondo() { let url = prompt("URL Imagen:"); if(url) document.body.style.backgroundImage = `url(${url})`; }
        function borrarHistorialDia() {
            const f = document.getElementById('reportDate').value;
            if(!f || !confirm(`¿Borrar historial del ${f}?`)) return;
            let ups = { secret: FIREBASE_SECRET };
            logsGlobal.forEach(l => { if((l.fechaISO && l.fechaISO===f) || coincideFecha(l.hora, f)) ups[l.key] = null; });
            database.ref('logs').update(ups).then(() => alert("Eliminado."));
        }
        function descargarCarnet(id) {
            const p = db.personas[id];
            const win = window.open('','','width=350,height=500');
            win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.card{width:280px;height:420px;background:white;border-radius:20px;box-shadow:0 10px 20px rgba(0,0,0,0.2);overflow:hidden;position:relative;border:1px solid #ddd;}.header{background:#002b7f;height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;text-align:center;}.qr-container{background:white;padding:15px;border-radius:15px;margin-top:20px;display:inline-block;border:1px solid #eee;}.info{padding:20px;text-align:center;}.id-label{font-size:1.6rem;font-weight:900;color:#002b7f;margin:10px 0;}.footer{position:absolute;bottom:0;width:100%;height:15px;background:linear-gradient(90deg,#002b7f 33%,#ffffff 33%,#ffffff 66%,#ce1126 66%);}</style></head><body><div class="card"><div class="header"><h2>ESCUELA LA CARPIO</h2><small>IDENTIFICACIÓN</small></div><div style="text-align:center;"><div class="qr-container"><div id="q"></div></div></div><div class="info"><div class="id-label">${id}</div><div style="font-weight:bold;font-size:1.2rem;">${p.nombre}</div><div style="color:#ce1126;font-weight:bold;margin-top:5px;">${p.puesto||''}</div></div><div class="footer"></div></div><script>new QRCode(document.getElementById("q"),{text:"${id}",width:140,height:140});setTimeout(()=>window.print(),800);<\/script></body></html>`);
            win.document.close();
        }
        function imprimirTodosLosCarnets() {
            const win = window.open('',''); win.document.write(`<html><head><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script></head><body>`);
            Object.entries(db.personas).forEach(([id,p]) => { if(id!=='secret') win.document.write(`<div style="width:200px;border:1px solid #333;padding:10px;text-align:center;display:inline-block;margin:5px;"><div id="qr-${id.replace(/\W/g,'')}"></div><b>${id}</b><br>${p.nombre}</div>`); });
            win.document.write(`<script>${Object.keys(db.personas).filter(k=>k!=='secret').map(id => `new QRCode(document.getElementById("qr-${id.replace(/\W/g,'')}"),{text:\"${id}\",width:100,height:100});`).join('\n')} setTimeout(()=>window.print(),1500);<\/script></body></html>`);
            win.document.close();
        }
        function importarCSV() { 
            const f = document.getElementById('csvFile').files[0]; const r = new FileReader(); 
            r.onload = (e) => { e.target.result.split('\n').forEach((l, i) => { if(i>0 && l.trim()){ let c=l.split(','); db.personas[c[0].trim()]={nombre:c[1]?.trim(), puesto:c[2]?.trim(), telefono:c[3]?.trim()}; } }); renderAlumnos(); alert("Importado."); }; r.readAsText(f); 
        }
    </script>
</body>
</html>
