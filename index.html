<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ASISTENCIA DE ESCUELA LA CARPIO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { 
            --primary: #1a5c8a; --accent: #27ae60; --danger: #c0392b; 
            --dark: #2c3e50; --info: #0d6efd; --warning: #f39c12; 
            --cr-blue: #002b7f; --cr-red: #ce1126;
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-color: #f8f9fa;
            background-image: linear-gradient(rgba(255,255,255,0.94), rgba(255,255,255,0.94)),
                repeating-linear-gradient(45deg, var(--cr-blue) 0, var(--cr-blue) 2px, transparent 0, transparent 50%),
                repeating-linear-gradient(-45deg, var(--cr-red) 0, var(--cr-red) 2px, transparent 0, transparent 50%);
            background-size: cover, 80px 80px, 80px 80px;
        }

        .navbar { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--cr-red); }
        #scan-view, #parent-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .scanner-card { background: #ffffff; padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 8px solid var(--cr-blue); }
        .input-scan { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #e0e0e0; border-radius: 12px; text-align: center; outline: none; margin-top: 15px; box-sizing: border-box; }

        #master-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white !important; display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.2s; }
        .btn-m { background-color: var(--primary) !important; } 
        .btn-s { background-color: var(--accent) !important; } 
        .btn-d { background-color: var(--danger) !important; } 
        .btn-i { background-color: var(--info) !important; } 
        .btn-w { background-color: var(--warning) !important; }
        .btn-dark { background-color: var(--dark) !important; }

        .power-bar { background: #f1f4f8; padding: 15px; border-radius: 15px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; border: 1px solid #ddd; flex-wrap: wrap; justify-content: space-between;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #e9ecef; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--dark); border-bottom: 2px solid #dee2e6; }
        td { border-bottom: 1px solid #eee; padding: 12px 15px; }

        .tab-btn { padding: 12px 28px; cursor: pointer; border: none; background: #e9ecef; border-radius: 8px; font-weight: bold; margin-right: 10px; }
        .tab-btn.active { background: var(--cr-blue); color: white; }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; display: none; border: 2px solid var(--info); background: #000; min-height: 250px; }
    </style>
</head>
<body>

    <div class="navbar no-print">
        <div><strong>ASISTENCIA DE ESCUELA LA CARPIO</strong></div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-w" onclick="mostrarVista('parent-view')">👨‍👩‍👧 PADRES</button>
            <button class="btn btn-i" onclick="pedirClaveEscaner()">📷 ESCÁNER</button>
            <button class="btn btn-m" onclick="pedirClaveMaster()">🔓 PANEL MASTER</button>
        </div>
    </div>

    <div id="scan-view" style="display:none;">
        <div class="scanner-card">
            <h2 style="color:var(--cr-blue);">Registro de Entrada/Salida</h2>
            <input type="text" id="lector" class="input-scan" placeholder="Escanee carné..." autofocus>
            
            <div id="reader"></div>
            <button id="btnCamara" class="btn btn-i" style="width:100%; margin-top:15px;" onclick="toggleCamara()">📷 INICIAR CÁMARA</button>

            <div id="resBox" style="margin-top:20px; display:none; padding:20px; border-radius:15px; border: 2px solid #ddd;">
                <h2 id="resNombre"></h2>
                <h3 id="resMov"></h3>
            </div>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="btn btn-dark" style="flex:1" onclick="cambiarPasswordEscaner()">🔑 CLAVE</button>
                <button class="btn btn-d" style="flex:1" onclick="cerrarVistaProtegida('scan-view')">CERRAR</button>
            </div>
        </div>
    </div>

    <div id="parent-view">
        <div class="scanner-card" style="border-top-color: var(--accent);">
            <h2 style="color: var(--accent);">Consulta para Padres</h2>
            <input type="text" id="parentInput" class="input-scan" placeholder="Código de miembro">
            <button class="btn btn-s" style="width:100%; margin-top:20px; padding:15px;" onclick="consultarPadre()">BUSCAR</button>
            <div id="parentResult" style="margin-top:20px; display:none; text-align:left;">
                <div style="background:#f9f9f9; padding:15px; border-radius:12px; border:1px solid #eee; margin-bottom:15px;">
                    <h3 id="parentStudentName" style="margin:0; color:var(--primary);"></h3>
                    <p id="parentStudentPuesto" style="margin:5px 0; font-weight:bold; color:var(--cr-red);"></p>
                    <button id="btnConsultaWA" class="btn btn-w" style="width:100%; margin-top:10px;">💬 ENVIAR CONSULTA</button>
                </div>
                <div id="parentLogList" style="border: 1px solid #eee; border-radius:10px; max-height:200px; overflow-y:auto; background:white;"></div>
            </div>
        </div>
    </div>

    <div id="master-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="color:var(--primary); margin:0;">Gestión Administrativa</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-s" onclick="editarNumeroJunta()">📱 TEL. OFICIAL</button>
                <button class="btn btn-i" onclick="cambiarFondo()">🖼️ FONDO</button>
                <button class="btn btn-w" onclick="cambiarPasswordMaster()">🔑 CLAVE MASTER</button>
                <button class="btn btn-d" onclick="cerrarMaster()">❌ SALIR</button>
            </div>
        </div>

        <div class="tabs-container">
            <button id="tab1" class="tab-btn active" onclick="cambiarTab(1)">👥 MIEMBROS</button>
            <button id="tab2" class="tab-btn" onclick="cambiarTab(2)">📊 REPORTE HISTÓRICO</button>
        </div>

        <div id="sec-alumnos">
            <div class="power-bar">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-i" onclick="agregarMiembroManual()">➕ AGREGAR</button>
                    <button class="btn btn-m" onclick="sincronizarConNube()">💾 GUARDAR</button>
                    <button class="btn btn-s" onclick="imprimirTodosLosCarnets()">📇 CARNÉS</button>
                </div>
            </div>
            <input type="text" id="busqueda" placeholder="🔍 Buscar..." onkeyup="filtrarRapido()" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; border:2px solid var(--primary);">
            <table>
                <thead>
                    <tr><th>Estado</th><th>ID</th><th>Nombre</th><th>Sección</th><th>WhatsApp</th><th>Acción</th></tr>
                </thead>
                <tbody id="tablaAlumnos"></tbody>
            </table>
        </div>

        <div id="sec-reporte" style="display:none;">
            <div class="power-bar">
                <div style="display:flex; gap:10px; align-items:center;">
                    <label><b>Fecha:</b></label>
                    <input type="date" id="reportDate" style="padding:10px; border-radius:8px;">
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-s" onclick="filtrarVistaReporte('ENTRADA')">✅ LLEGARON</button>
                    <button class="btn btn-m" onclick="filtrarVistaReporte('SALIDA')">🚪 SALIERON</button>
                    <button class="btn btn-d" onclick="filtrarVistaReporte('AUSENTES')">❌ AUSENTES</button>
                </div>
            </div>
            <table id="tabla-logs-final">
                <thead id="headReporte"></thead>
                <tbody id="cuerpoReporte"></tbody>
            </table>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FECHA DE HOY (SINCRO CON PC)
        function obtenerFechaLocal() {
            const ahora = new Date();
            const offset = ahora.getTimezoneOffset();
            const local = new Date(ahora.getTime() - (offset * 60 * 1000));
            return local.toISOString().split('T')[0];
        }

        // ASIGNAR FECHA AL CARGAR
        window.onload = () => {
            document.getElementById('reportDate').value = obtenerFechaLocal();
        };

        const firebaseConfig = { databaseURL: "https://escuela-la-carpio-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let db = { personas: {} };
        let logsGlobal = [];
        let html5QrCode; 
        let passMaster = localStorage.getItem('PASS_MASTER') || "CARPIO2026";
        let passEscaner = localStorage.getItem('PASS_SCAN') || "1234";

        // LÓGICA DE ESCANEO
        function procesarEscaneo(id) {
            id = id.trim();
            if(!id || !db.personas[id]) return;
            const hISO = obtenerFechaLocal();
            database.ref('logs').push({ 
                id: id, nombre: db.personas[id].nombre, 
                hora: new Date().toLocaleString(), fechaISO: hISO, 
                tipo: "REGISTRO" 
            });
            alert("Registrado: " + db.personas[id].nombre);
        }

        async function toggleCamara() {
            const readerDiv = document.getElementById('reader');
            const btn = document.getElementById('btnCamara');

            if (readerDiv.style.display === 'none') {
                readerDiv.style.display = 'block';
                html5QrCode = new Html5Qrcode("reader");
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };

                try {
                    await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                        procesarEscaneo(text);
                        pararCamara();
                    });
                    btn.innerText = "❌ DETENER CÁMARA";
                } catch (err) {
                    alert("Error de cámara: " + err);
                    readerDiv.style.display = 'none';
                }
            } else {
                await pararCamara();
            }
        }

        async function pararCamara() {
            if(html5QrCode) {
                await html5QrCode.stop();
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btnCamara').innerText = "📷 INICIAR CÁMARA";
            }
        }

        // FUNCIONES DE VISTA (NO MODIFICADAS)
        function mostrarVista(id) { 
            document.querySelectorAll('#scan-view, #parent-view').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if(id !== 'scan-view') pararCamara();
        }

        function pedirClaveEscaner() { if(prompt("Clave:") === passEscaner) mostrarVista('scan-view'); }
        function pedirClaveMaster() { if(prompt("Clave:") === passMaster) document.getElementById('master-panel').style.display = 'block'; }
        function cerrarMaster() { document.getElementById('master-panel').style.display = 'none'; }
        function cerrarVistaProtegida(id) { document.getElementById(id).style.display = 'none'; mostrarVista('parent-view'); }
        
        database.ref('personas').on('value', (s) => { db.personas = s.val() || {}; renderAlumnos(); });
        database.ref('logs').on('value', (s) => { 
            logsGlobal = []; s.forEach(c => { let v = c.val(); v.key = c.key; logsGlobal.push(v); });
            renderAlumnos(); 
        });

        function renderAlumnos() {
            const t = document.getElementById('tablaAlumnos'); t.innerHTML = "";
            Object.entries(db.personas).forEach(([id, p]) => {
                t.insertAdjacentHTML('beforeend', `<tr><td>-</td><td>${id}</td><td>${p.nombre}</td><td>${p.puesto||''}</td><td>${p.telefono||''}</td><td><button onclick="enviarWA('${p.telefono}')">💬</button></td></tr>`);
            });
        }

        function cambiarTab(n) { 
            document.getElementById('sec-alumnos').style.display = (n===1)?'block':'none'; 
            document.getElementById('sec-reporte').style.display = (n===2)?'block':'none'; 
        }
        
        function enviarWA(tel) { if(tel) window.open(`https://wa.me/506${tel.replace(/\D/g,'')}`, '_blank'); }
    </script>
</body>
</html>
